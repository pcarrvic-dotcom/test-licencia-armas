<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Licencia de Armas - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --verde: #1b5e20; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .card { background: white; max-width: 500px; width: 100%; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--verde); text-align: center; border-bottom: 2px solid var(--verde); padding-bottom: 10px; font-size: 1.2rem; }
        .opcion { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; text-align: left; cursor: pointer; font-size: 0.95rem; }
        .correcta { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #1b5e20; font-weight: bold; }
        .incorrecta { background: #ffcdd2 !important; border-color: #f44336 !important; color: #b71c1c; }
        .btn { background: var(--verde); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #debug-info { font-size: 0.7rem; color: #999; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>🦅 EXAMEN LICENCIA DE ARMAS</h1>
    
    <div id="pantalla-carga" style="text-align:center;">
        <p id="estado">Leyendo base de datos...</p>
        <button id="btn-comenzar" class="btn hidden" onclick="comenzar()">EMPEZAR TEST</button>
        <div id="debug-info"></div>
    </div>

    <div id="pantalla-test" class="hidden">
        <p id="pregunta" style="font-weight: bold; font-size: 1rem; line-height: 1.4;"></p>
        <div id="opciones"></div>
        <button id="btn-next" class="btn hidden" style="margin-top:10px" onclick="siguiente()">SIGUIENTE</button>
    </div>

    <div id="pantalla-final" class="hidden" style="text-align: center;">
        <h2 id="nota" style="font-size: 3rem; margin: 0;"></h2>
        <p id="texto-final"></p>
        <button class="btn" onclick="location.reload()">REPETIR</button>
    </div>
</div>

<script>
    let banco = [];
    let examen = [];
    let indice = 0;
    let aciertos = 0;

    window.onload = function() {
        Papa.parse("datos.csv", {
            download: true,
            header: false,
            skipEmptyLines: true,
            encoding: "ISO-8859-1", // ESTA LÍNEA ES LA QUE ARREGLA LAS TILDES
            complete: function(res) {
                // Saltamos la fila 0 (encabezados)
                const filas = res.data.slice(1); 
                
                banco = filas.map(f => {
                    // Limpieza básica de espacios
                    const trim = (val) => val ? val.toString().trim() : "";
                    
                    return {
                        p: trim(f[2]), // Columna 3 (Pregunta)
                        a: trim(f[3]), // Columna 4 (Opción A)
                        b: trim(f[4]), // Columna 5 (Opción B)
                        c: trim(f[5]), // Columna 6 (Opción C)
                        r: trim(f[6]).toUpperCase() // Columna 7 (Correcta)
                    };
                }).filter(f => f.p.length > 5);

                if(banco.length > 0) {
                    document.getElementById('estado').innerText = "✅ " + banco.length + " preguntas listas.";
                    document.getElementById('btn-comenzar').classList.remove('hidden');
                } else {
                    document.getElementById('estado').innerText = "❌ Error: Revisa el archivo datos.csv";
                }
            }
        });
    };

    function comenzar() {
        // Mezclar y elegir 20
        examen = banco.sort(() => 0.5 - Math.random()).slice(0, 20);
        document.getElementById('pantalla-carga').classList.add('hidden');
        document.getElementById('pantalla-test').classList.remove('hidden');
        mostrar();
    }

    function mostrar() {
        let q = examen[indice];
        document.getElementById('pregunta').innerText = (indice + 1) + ". " + q.p;
        document.getElementById('btn-next').classList.add('hidden');
        
        let html = "";
        const limpiarRespuesta = (t) => t.replace(/^[A-C][\)\.\s-]*/i, "");
        
        // Generamos los botones de opciones
        html += `<button class="opcion" onclick="validar(this, 'A', '${q.r}')">A) ${limpiarRespuesta(q.a)}</button>`;
        html += `<button class="opcion" onclick="validar(this, 'B', '${q.r}')">B) ${limpiarRespuesta(q.b)}</button>`;
        html += `<button class="opcion" onclick="validar(this, 'C', '${q.r}')">C) ${limpiarRespuesta(q.c)}</button>`;
        
        document.getElementById('opciones').innerHTML = html;
    }

    function validar(btn, elegida, correcta) {
        let buttons = document.querySelectorAll('.opcion');
        buttons.forEach(b => b.disabled = true);
        
        // Comprobar si es correcta (acepta 'A' o 'A)')
        if(elegida === correcta || (elegida + ")") === correcta) {
            btn.classList.add('correcta');
            aciertos++;
        } else {
            btn.classList.add('incorrecta');
            buttons.forEach(b => {
                // Marca la correcta en verde para que aprendas
                if(b.innerText.startsWith(correcta + ")") || b.innerText.startsWith(correcta)) {
                    b.classList.add('correcta');
                }
            });
        }
        document.getElementById('btn-next').classList.remove('hidden');
    }

    function siguiente() {
        indice++;
        if(indice < 20) {
            mostrar();
        } else {
            document.getElementById('pantalla-test').classList.add('hidden');
            document.getElementById('pantalla-final').classList.remove('hidden');
            document.getElementById('nota').innerText = aciertos + " / 20";
            document.getElementById('texto-final').innerText = aciertos >= 16 ? "¡APTO!" : "NO APTO";
            document.getElementById('texto-final').style.color = aciertos >= 16 ? "green" : "red";
            document.getElementById('texto-final').style.fontWeight = "bold";
        }
    }
</script>
</body>
</html>
