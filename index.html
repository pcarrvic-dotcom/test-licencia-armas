<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Guardia Civil - Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --verde: #1b5e20; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; max-width: 500px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: var(--verde); text-align: center; font-size: 1.3rem; border-bottom: 2px solid var(--verde); padding-bottom: 10px; }
        .pregunta { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; color: #333; line-height: 1.5; }
        .opcion { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opcion:hover { background: #f1f8e9; }
        .correcta { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #1b5e20; font-weight: bold; }
        .incorrecta { background: #ffcdd2 !important; border-color: #f44336 !important; color: #b71c1c; }
        .btn { background: var(--verde); color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; }
        .hidden { display: none; }
        .progreso { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦅 TEST LICENCIA DE ARMAS</h1>

    <div id="pantalla-inicio" style="text-align:center; padding: 20px;">
        <div id="mensaje-carga">Conectando con base de datos...</div>
        <div id="menu-inicio" class="hidden">
            <p>Preguntas cargadas correctamente.</p>
            <button class="btn" onclick="iniciarExamen()">EMPEZAR EXAMEN (20 PREG.)</button>
        </div>
    </div>

    <div id="pantalla-test" class="hidden">
        <div id="progreso" class="progreso"></div>
        <div id="enunciado" class="pregunta"></div>
        <div id="opciones"></div>
        <button id="btn-next" class="btn hidden" style="margin-top:20px" onclick="siguiente()">SIGUIENTE PREGUNTA</button>
    </div>

    <div id="pantalla-final" class="hidden" style="text-align:center">
        <h2 id="veredicto"></h2>
        <div id="nota" style="font-size: 4rem; font-weight: bold; margin-bottom: 20px;"></div>
        <button class="btn" onclick="location.reload()">REPETIR TEST</button>
    </div>
</div>

    let actual = 0;
    let aciertos = 0;

                        p: (f.Pregunta || "").trim(),

                        b: (f["Opción B"] || f["Opcion B"] || "").trim(),
                        c: (f["Opción C"] || f["Opcion C"] || "").trim(),
                        r: (f["Respuesta Correcta"] || "").trim().toUpperCase()
                    };
