<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Guardia Civil - Licencia de Armas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --verde: #1b5e20; --bg: #f0f2f5; --texto: #1a1a1a; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: white; max-width: 500px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; }
        h1 { color: var(--verde); text-align: center; font-size: 1.3rem; border-bottom: 2px solid var(--verde); padding-bottom: 10px; margin-top: 0; }
        .box { text-align: center; padding: 30px; }
        .meta { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .pregunta { font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.4; color: var(--texto); }
        .opcion { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; background: #fff; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opcion:hover { background: #f8f9fa; border-color: #bbb; }
        .correcta { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32; font-weight: bold; }
        .incorrecta { background: #ffebee !important; border-color: #f44336 !important; color: #c62828; }
        .btn { background: var(--verde); color: white; border: none; padding: 16px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        .hidden { display: none; }
        #loading-status { font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦅 EXAMEN LICENCIA DE ARMAS</h1>

    <div id="pantalla-carga" class="box">
        <div id="loading-status">Cargando base de datos...</div>
        <div id="controles-inicio" class="hidden">
            <p style="color: #444;">Base de datos cargada correctamente.</p>
            <button class="btn" onclick="prepararExamen()">EMPEZAR TEST (20 PREGUNTAS)</button>
        </div>
    </div>

    <div id="pantalla-quiz" class="hidden">
        <div id="meta" class="meta"></div>
        <div id="enunciado" class="pregunta"></div>
        <div id="opciones"></div>
        <button id="btn-next" class="btn hidden" onclick="renderizarPregunta()">SIGUIENTE PREGUNTA</button>
    </div>

    <div id="pantalla-final" class="hidden" style="text-align:center">
        <h2>Resultado del Examen</h2>
        <div id="nota" style="font-size: 4rem; font-weight: bold; margin: 10px 0;"></div>
        <div id="veredicto" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;"></div>
        <button class="btn" onclick="location.reload()">REPETIR TEST</button>
    </div>
</div>

<script>

    let examen = [];
    let actual = 0;
